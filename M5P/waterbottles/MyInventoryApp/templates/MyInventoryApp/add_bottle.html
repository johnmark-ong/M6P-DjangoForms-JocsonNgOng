{% extends 'MyInventoryApp/base.html' %}
{% load static %}

{% block content %}
<h2 class="mb-3">Add Water Bottle</h2>

<div class="card col-md-8">
    <div class="card-header"><strong>Type in Waterbottle Details:</strong></div>
    <div class="card-body">
        <form method="POST" action="{% url 'add_bottle' %}">
            {% csrf_token %}

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="sku" class="form-label">SKU:</label>
                    <input type="text" class="form-control" id="sku" name="sku" required>
                </div>
                <div class="col-md-4">
                    <label for="brand" class="form-label">Brand:</label>
                    <input type="text" class="form-control" id="brand" name="brand" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="cost" class="form-label">Cost:</label>
                    <input type="number" class="form-control" id="cost" name="cost" step="0.01" min="0" required>
                </div>
                <div class="col-md-4">
                    <label for="size" class="form-label">Size:</label>
                    <input type="text" class="form-control" id="size" name="size" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="mouth_size" class="form-label">Mouth Size:</label>
                    <input type="text" class="form-control" id="mouth_size" name="mouth_size" required>
                </div>
                <div class="col-md-4">
                    <label for="color" class="form-label">Color:</label>
                    <input type="text" class="form-control" id="color" name="color" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="supplier" class="form-label">Supplier:</label>
                    <select class="form-select" id="supplier" name="supplier" required>
                        <option value="" disabled selected>-- Select Supplier --</option>
                        {% for s in suppliers %}
                            <option value="{{ s.pk }}">{{ s.Name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="quantity" class="form-label">Current Quantity:</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" min="0" required>
                </div>
            </div>

            <button type="submit" class="btn btn-success me-2">Confirm</button>
            <a href="{% url 'view_supplier' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
